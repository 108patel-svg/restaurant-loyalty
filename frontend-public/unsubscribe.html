<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribe - Loyalty Programme</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #C4531A;
            --brand-dark: #1A1410;
            --bg: #F7F3EE;
            --text: #1A1410;
            --muted: #6B6259;
            --white: #FFFFFF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 12px; }
        p { color: var(--muted); line-height: 1.5; margin-bottom: 30px; }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #EEE;
            border-top: 3px solid var(--brand);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success-icon { color: #2E7D32; font-size: 48px; margin-bottom: 20px; }
        .error-icon { color: #B3261E; font-size: 48px; margin-bottom: 20px; }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: var(--brand-dark);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card" id="main-card">
        <div id="loading">
            <div class="loading-spinner"></div>
            <h1>Processing...</h1>
            <p>Please wait while we update your preferences.</p>
        </div>

        <div id="success" style="display: none;">
            <div class="success-icon">✓</div>
            <h1>Unsubscribed</h1>
            <p>Your email preferences have been updated. You will no longer receive marketing emails from us.</p>
            <a href="index.html" class="btn">Back to Home</a>
        </div>

        <div id="error" style="display: none;">
            <div class="error-icon">!</div>
            <h1>Request Failed</h1>
            <p id="error-msg">This unsubscribe link is invalid or has expired.</p>
            <a href="index.html" class="btn">Back to Home</a>
        </div>
    </div>

    <script>
        async function handleUnsubscribe() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                showState('error', 'No secure token provided in the link.');
                return;
            }

            try {
                const res = await fetch(`/api/unsubscribe/${token}`, { method: 'POST' });
                const data = await res.json();

                if (data.success) {
                    showState('success');
                } else {
                    showState('error', data.error);
                }
            } catch (err) {
                showState('error', 'Unable to connect to the server. Please try again later.');
            }
        }

        function showState(state, msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById(state).style.display = 'block';
            if (msg) document.getElementById('error-msg').innerText = msg;
        }

        handleUnsubscribe();
    </script>
</body>
</html>
