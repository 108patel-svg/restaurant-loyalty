<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Dashboard - Loyalty Programme</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #F7F3EE;
            --dark: #1A1410;
            --ember: #C4531A;
            --muted: #6B6259;
            --border: rgba(26, 20, 16, 0.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            color: var(--dark);
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 32px; margin-bottom: 32px; }
        
        .card { background: white; border-radius: 16px; padding: 24px; border: 1px solid var(--border); margin-bottom: 24px; }
        
        .pending-list { list-style: none; }
        .pending-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border); }
        .pending-row:last-child { border-bottom: none; }
        .cust-info h3 { font-size: 18px; margin-bottom: 4px; }
        .cust-info p { font-size: 14px; color: var(--muted); }
        
        .btn { padding: 12px 24px; border-radius: 8px; font-weight: 500; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--dark); color: white; }
        .btn-ember { background: var(--ember); color: white; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); }
        
        /* Modal */
        #modal-spend {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center; justify-content: center;
            z-index: 100;
        }
        .modal-content { background: white; padding: 32px; border-radius: 20px; width: 100%; max-width: 400px; }
        .modal-content h2 { font-family: 'Cormorant Garamond', serif; margin-bottom: 16px; }
        input { width: 100%; height: 56px; border: 1px solid var(--border); border-radius: 8px; padding: 0 16px; font-size: 20px; margin-bottom: 24px; }
        
        #pin-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--cream); display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        
        .idle-msg { text-align: center; padding: 40px; color: var(--muted); }
        .badge { font-size: 12px; padding: 4px 8px; border-radius: 4px; background: #eee; margin-left: 8px; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="pin-overlay">
        <div style="text-align: center;">
            <h2 style="font-family: 'Cormorant Garamond', serif; margin-bottom: 24px;">Staff Access Required</h2>
            <input type="password" id="admin-pin" placeholder="Enter PIN" maxlength="4" style="text-align: center; width: 200px;">
            <button class="btn btn-primary" onclick="verifyPin()">Unlock Dashboard</button>
        </div>
    </div>

    <div class="container">
        <h1>Cashier Dashboard</h1>
        
        <div class="card">
            <h2 style="font-size: 20px; margin-bottom: 16px;">Pending Check-ins</h2>
            <div id="pending-container">
                <div class="idle-msg">Checking for customers...</div>
            </div>
        </div>

        <details class="card">
            <summary style="cursor: pointer; font-weight: 500;">Record spend manually</summary>
            <div style="margin-top: 24px;">
                <div class="form-group" style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 14px; margin-bottom: 8px;">Email Address</label>
                    <input type="email" id="manual-email" placeholder="e.g. john@example.com">
                </div>
                <div class="form-group" style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 14px; margin-bottom: 8px;">Spend Amount (£)</label>
                    <input type="number" id="manual-spend" step="0.01" placeholder="0.00">
                </div>
                <button class="btn btn-ember" onclick="recordSpend('manual')">Record Manual Spend</button>
            </div>
        </details>
    </div>

    <!-- Spend Modal -->
    <div id="modal-spend">
        <div class="modal-content">
            <h2 id="modal-cust-name">Customer Name</h2>
            <p id="modal-cust-email" style="margin-bottom: 24px; color: var(--muted); font-size: 14px;"></p>
            <p style="margin-bottom: 24px; color: var(--muted);">Tier: <span id="modal-cust-tier">None</span></p>
            <label style="display: block; font-size: 14px; margin-bottom: 8px;">Spend Amount (£)</label>
            <input type="number" id="spend-amount" step="0.01" min="0.01" max="500" placeholder="0.00">
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-ghost" onclick="closeModal()" style="flex: 1;">Cancel</button>
                <button class="btn btn-primary" onclick="recordSpend('pending')" style="flex: 2;">Confirm Spend &rarr;</button>
            </div>
        </div>
    </div>

    <script>
        let adminPin = '';
        let currentEmail = '';
        let pendingData = [];

        async function verifyPin() {
            const pin = document.getElementById('admin-pin').value;
            if (pin.length === 4) {
                adminPin = pin;
                document.getElementById('pin-overlay').style.display = 'none';
                startPolling();
            }
        }

        async function fetchPending() {
            try {
                const res = await fetch('/api/admin/pending-checkins', {
                    headers: { 'x-admin-pin': adminPin }
                });
                if (res.status === 401) {
                    alert("Unauthorized. Resetting...");
                    location.reload();
                }
                const data = await res.json();
                pendingData = data;
                renderPending();
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        function renderPending() {
            const container = document.getElementById('pending-container');
            if (pendingData.length === 0) {
                container.innerHTML = '<div class="idle-msg">No customers waiting — all spend recorded.</div>';
                return;
            }
            let html = '<ul class="pending-list">';
            pendingData.forEach(p => {
                html += `
                    <li class="pending-row">
                        <div class="cust-info">
                            <h3>${p.name} <span class="badge">${p.tier}</span></h3>
                            <p>${p.email} &bull; ${p.timeAgo} minutes ago</p>
                        </div>
                        <button class="btn btn-primary" onclick="openModal('${p.email}', '${p.name}', '${p.tier}')">Record spend</button>
                    </li>
                `;
            });
            html += '</ul>';
            container.innerHTML = html;
        }

        function openModal(email, name, tier) {
            currentEmail = email;
            document.getElementById('modal-cust-name').innerText = name;
            document.getElementById('modal-cust-email').innerText = email;
            document.getElementById('modal-cust-tier').innerText = tier;
            document.getElementById('spend-amount').value = '';
            document.getElementById('modal-spend').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-spend').style.display = 'none';
        }

        async function recordSpend(type) {
            let email = currentEmail;
            let spend = 0;
            
            if (type === 'manual') {
                email = document.getElementById('manual-email').value;
                spend = document.getElementById('manual-spend').value;
            } else {
                spend = document.getElementById('spend-amount').value;
            }

            if (!email || !spend) return alert("Please fill in all fields.");
            if (parseFloat(spend) > 500) return alert("Maximum spend is £500.");

            try {
                const res = await fetch('/api/admin/record-spend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-admin-pin': adminPin },
                    body: JSON.stringify({ email, spend: parseFloat(spend) })
                });
                const data = await res.json();
                if (data.success) {
                    alert(`£${parseFloat(spend).toFixed(2)} recorded for ${data.name}. Tier: ${data.tier.toUpperCase()}${data.tierUp ? ' (TIER UP!)' : ''}`);
                    closeModal();
                    fetchPending();
                    if (type === 'manual') {
                        document.getElementById('manual-email').value = '';
                        document.getElementById('manual-spend').value = '';
                    }
                } else {
                    alert(data.error || "Failed to record spend.");
                }
            } catch (err) {
                alert("Server error.");
            }
        }

        function startPolling() {
            fetchPending();
            setInterval(fetchPending, 10000);
        }
    </script>
</body>
</html>
