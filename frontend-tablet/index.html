<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Check-in | Loyalty Rewards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.google.com/recaptcha/api.js?render=6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"></script>
    <style>
        :root {
            --brand: #C4531A;
            --brand-dark: #1A1410;
            --bg: #F7F3EE;
            --text: #1A1410;
            --muted: #6B6259;
            --glass: rgba(255, 255, 255, 0.98);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #1A1410; /* Solid fallback */
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-y: auto;
        }
        .container {
            background: #FFFFFF; /* Pure white for maximum contrast */
            width: 100%;
            max-width: 540px;
            padding: 60px 40px;
            border-radius: 32px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            z-index: 100;
            margin: auto;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            color: var(--brand-dark);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: 18px;
            color: var(--muted);
            margin-bottom: 48px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            color: var(--muted);
        }
        input {
            width: 100%;
            height: 72px;
            padding: 0 24px;
            border: 2px solid #E0DCD8;
            border-radius: 16px;
            font-size: 20px;
            font-family: inherit;
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 5px rgba(196, 83, 26, 0.1);
            transform: translateY(-2px);
        }
        .btn-primary {
            width: 100%;
            height: 72px;
            background: var(--brand);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 24px;
            box-shadow: 0 10px 20px rgba(196, 83, 26, 0.2);
        }
        .btn-primary:hover {
            background: #D86225;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(196, 83, 26, 0.3);
        }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .marketing-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 32px 0;
            cursor: pointer;
            padding: 20px;
            background: #F9F7F5;
            border-radius: 16px;
            transition: 0.2s;
        }
        .marketing-row:hover { background: #F0EDE9; }
        .marketing-row input { width: 28px; height: 28px; accent-color: var(--brand); margin: 0; flex-shrink: 0; }
        .marketing-text { font-size: 15px; line-height: 1.4; color: var(--text); text-align: left; }
        
        .footer-links {
            margin-top: 48px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .footer-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }
        .footer-links a:hover { color: var(--brand); }
        .staff-link {
            font-weight: 600;
            color: var(--brand) !important;
            border: 1px solid rgba(196, 83, 26, 0.2);
            padding: 10px 20px;
            border-radius: 99px;
            align-self: center;
        }

        .step { display: none; opacity: 0; transform: translateY(20px); transition: all 0.5s ease; }
        .step.active { display: block; opacity: 1; transform: translateY(0); }

        /* Success View */
        .success-badge {
            display: inline-block;
            padding: 10px 24px;
            background: var(--brand-dark);
            color: var(--gold);
            border-radius: 99px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .discount-text {
            font-size: 32px;
            font-weight: 700;
            color: var(--brand);
            margin: 24px 0;
        }
        
        @media (max-width: 600px) {
            .container { padding: 40px 24px; }
            h1 { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- STEP 1: Check-in Form -->
        <div id="step-form" class="step active">
            <h1>Loyalty Check-in</h1>
            <p class="subtitle">Join our rewards programme today</p>
            
            <form id="checkin-form">
                <div class="form-group">
                    <label>Your Full Name</label>
                    <input type="text" id="name" required placeholder="e.g. John Doe">
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="e.g. john@example.com">
                </div>

                <label class="marketing-row">
                    <input type="checkbox" id="marketing_consent">
                    <span class="marketing-text">
                        I'd like to receive exclusive rewards and updates.
                        <br><small style="color: var(--muted);">Unsubscribe at any time. We never share your data.</small>
                    </span>
                </label>
                
                <button type="submit" class="btn-primary" id="btn-submit">Check in &rarr;</button>
            </form>

            <div class="footer-links">
                <a href="terms.html" target="_blank">Terms & Privacy Policy</a>
                <a href="admin.html" class="staff-link">Staff Admin Login</a>
            </div>
        </div>

        <!-- STEP 2: Success Confirmation -->
        <div id="step-success" class="step">
            <h1 id="success-name">Thank you!</h1>
            <div id="success-tier" class="success-badge">None Status</div>
            
            <p class="discount-text" id="success-discount">10% OFF TODAY</p>
            
            <p class="subtitle">Please tell the cashier your email when paying to record your spend.</p>
            
            <button class="btn-primary" onclick="resetForm()" style="background: var(--brand-dark);">Next Customer</button>
            
            <p id="timer-text" style="margin-top: 32px; font-size: 13px; color: var(--muted);">Resetting in 60s...</p>
        </div>
    </div>

    <script>
        const RECAPTCHA_SITE_KEY = '6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI';
        let resetTimer;

        function resetForm() {
            clearInterval(resetTimer);
            document.getElementById('step-success').classList.remove('active');
            document.getElementById('step-form').classList.add('active');
            document.getElementById('checkin-form').reset();
            document.getElementById('btn-submit').disabled = false;
        }

        function startTimer() {
            let timeLeft = 60;
            clearInterval(resetTimer);
            resetTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-text').innerText = `Resetting in ${timeLeft}s...`;
                if (timeLeft <= 0) resetForm();
            }, 1000);
        }

        document.getElementById('checkin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const marketing_consent = document.getElementById('marketing_consent').checked;

            grecaptcha.ready(() => {
                grecaptcha.execute(RECAPTCHA_SITE_KEY, {action: 'checkin'}).then(async (token) => {
                    try {
                        const res = await fetch('/api/checkin', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name, email, marketing_consent, recaptcha_token: token })
                        });
                        const data = await res.json();
                        
                        if (data.success) {
                            document.getElementById('step-form').classList.remove('active');
                            document.getElementById('step-success').classList.add('active');
                            document.getElementById('success-name').innerText = `Thank you, ${data.name}!`;
                            document.getElementById('success-tier').innerText = `${data.tier.toUpperCase()} STATUS`;
                            document.getElementById('success-discount').innerText = `${data.discount}% OFF TODAY`;
                            startTimer();
                        } else {
                            alert(data.error || "Something went wrong.");
                            btn.disabled = false;
                        }
                    } catch (err) {
                        alert("Network error. Please try again.");
                        btn.disabled = false;
                    }
                });
            });
        });
    </script>
</body>
</html>
