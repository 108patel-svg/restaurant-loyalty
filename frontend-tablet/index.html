<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loyalty Check-in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #F7F3EE;
            --dark: #1A1410;
            --ember: #C4531A;
            --muted: #6B6259;
            --border: rgba(26, 20, 16, 0.12);
            --brand-dark: #1A1410;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            color: var(--dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            text-align: center;
        }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 500; margin-bottom: 8px; }
        .subtitle { font-size: 1.1rem; color: var(--muted); margin-bottom: 40px; }

        .form-group { text-align: left; margin-bottom: 24px; }
        label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        input {
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--ember); }

        .btn-primary {
            width: 100%;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: 500;
            background: var(--ember);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .consent-box { display: flex; align-items: flex-start; gap: 12px; text-align: left; margin: 32px 0; cursor: pointer; }
        .consent-box input { width: 24px; height: 24px; margin-top: 4px; flex-shrink: 0; }
        .consent-text { font-size: 0.95rem; line-height: 1.4; color: var(--muted); }

        .result-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(26, 20, 16, 0.05); }
        .tier-badge { display: inline-block; padding: 8px 16px; background: #F0EDE9; border-radius: 100px; font-size: 0.8rem; font-weight: 600; letter-spacing: 1px; margin-bottom: 16px; }
        .discount-text { font-family: 'Cormorant Garamond', serif; font-size: 4rem; color: var(--ember); margin: 16px 0; }
        
        .milestone-banner { background: #E8F5E9; color: #2E7D32; padding: 12px; border-radius: 12px; margin-bottom: 24px; font-weight: 600; font-size: 0.9rem; }
        .footer-links { margin-top: 32px; font-size: 0.85rem; color: var(--muted); }
        .footer-links a { color: var(--dark); text-decoration: none; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="container">
        <!-- STEP 0: Cashier Input -->
        <div id="step-spend" class="step active">
            <h1>Check-in</h1>
            <p class="subtitle">Enter the bill total to continue</p>
            <div class="form-group">
                <label>Amount (£)</label>
                <input type="number" id="spend-amount" step="0.01" placeholder="0.00" autofocus>
            </div>
            <button class="btn-primary" onclick="goToCustomerInfo()">Next &rarr;</button>
        </div>

        <!-- STEP 1: Customer - Name & Email -->
        <div id="step-customer" class="step">
            <h1>Your Details</h1>
            <p class="subtitle">Join our loyalty programme for rewards</p>
            <form id="checkin-form">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="cust-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="cust-email" required placeholder="john@example.com">
                </div>

                <label class="consent-box">
                    <input type="checkbox" id="marketing_consent" required>
                    <span class="consent-text">
                        <strong>I agree to the Terms of Service</strong> and <a href="privacy.html" target="_blank">Privacy Policy</a>.
                    </span>
                </label>
                
                <button type="submit" class="btn-primary" id="btn-submit">Finish Check-in &rarr;</button>
                <button type="button" class="btn-primary" onclick="resetForm()" style="background: #EEE; color: #666; margin-top: 12px; height: 48px; font-size: 14px;">Cancel</button>
            </form>
        </div>

        <!-- STEP 2: Success -->
        <div id="step-success" class="step result-card">
            <div id="milestone-alert" class="milestone-banner" style="display:none;">
                🎉 MILESTONE REACHED: <span id="res-milestone">Free Dessert</span>
            </div>
            <div class="tier-badge" id="res-tier">BRONZE STATUS</div>
            <h1 id="res-name">Thank you!</h1>
            <p class="discount-text" id="res-discount">10% OFF TODAY</p>
            <p class="subtitle">Your rewards have been updated successfully.</p>
            <button class="btn-primary" onclick="resetForm()" style="background: var(--brand-dark);">Next Customer</button>
            <p id="timer-text" style="margin-top: 24px; font-size: 12px; color: var(--muted);">Resetting in 60s...</p>
        </div>
    </div>

    <script>
        let RECAPTCHA_SITE_KEY = '';

        async function initApp() {
            try {
                const configRes = await fetch('/api/config');
                const config = await configRes.json();
                RECAPTCHA_SITE_KEY = config.recaptchaSiteKey;
                if (RECAPTCHA_SITE_KEY) {
                    const script = document.createElement('script');
                    script.src = `https://www.google.com/recaptcha/api.js?render=${RECAPTCHA_SITE_KEY}`;
                    document.head.appendChild(script);
                }
            } catch (err) {}
        }
        initApp();

        let currentSpend = 0;
        let resetTimer;

        function showStep(id) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function goToCustomerInfo() {
            const amt = document.getElementById('spend-amount').value;
            if (!amt || amt <= 0) return alert("Enter a valid amount.");
            currentSpend = parseFloat(amt);
            showStep('step-customer');
        }

        function resetForm() {
            clearInterval(resetTimer);
            currentSpend = 0;
            document.getElementById('spend-amount').value = '';
            document.getElementById('cust-name').value = '';
            document.getElementById('cust-email').value = '';
            document.getElementById('marketing_consent').checked = false;
            document.getElementById('btn-submit').disabled = false;
            showStep('step-spend');
        }

        function startAutoReset() {
            let timeLeft = 60;
            clearInterval(resetTimer);
            resetTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-text').innerText = `Resetting in ${timeLeft}s...`;
                if (timeLeft <= 0) resetForm();
            }, 1000);
        }

        document.getElementById('checkin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            const name = document.getElementById('cust-name').value;
            const email = document.getElementById('cust-email').value;
            const marketing_consent = document.getElementById('marketing_consent').checked;

            const runCheckin = async (token = '') => {
                try {
                    const res = await fetch('/api/checkin-with-spend', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, spend: currentSpend, marketing_consent, recaptcha_token: token })
                    });
                    const data = await res.json();
                    if (data.success) {
                        document.getElementById('res-name').innerText = `Thank you, ${data.name}!`;
                        document.getElementById('res-tier').innerText = `${data.tier.toUpperCase()} STATUS`;
                        document.getElementById('res-discount').innerText = `${data.discount}% OFF TODAY`;
                        if (data.milestoneReward) {
                            document.getElementById('res-milestone').innerText = data.milestoneReward;
                            document.getElementById('milestone-alert').style.display = 'block';
                        }
                        showStep('step-success');
                        startAutoReset();
                    } else {
                        alert(data.error || "Error");
                        btn.disabled = false;
                    }
                } catch (err) {
                    alert("Network error.");
                    btn.disabled = false;
                }
            };

            if (typeof grecaptcha === 'undefined' || !RECAPTCHA_SITE_KEY) {
                await runCheckin();
            } else {
                grecaptcha.ready(() => {
                    grecaptcha.execute(RECAPTCHA_SITE_KEY, {action: 'checkin'}).then(async (token) => {
                        await runCheckin(token);
                    }).catch(async () => {
                        await runCheckin();
                    });
                });
            }
        });
    </script>
</body>
</html>
