<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribe - Loyalty Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --cream: #F7F3EE; --dark: #1A1410; --ember: #C4531A; --border: rgba(26,20,16,0.12); }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--cream); color: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-image: url('background.png'); background-size: cover; background-position: center; }
        .card { background-color: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 100%; max-width: 400px; padding: 32px 24px; text-align: center; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; margin-bottom: 12px; }
        p { font-size: 14px; line-height: 1.6; margin-bottom: 16px; color: #6B6259; }
        button { width: 100%; height: 48px; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; transition: 0.2s; border: none; margin-bottom: 12px; }
        .btn-unsub { background-color: #B3261E; color: white; }
        .btn-unsub:hover { background-color: #8C1D18; }
        .btn-resub { background-color: var(--ember); color: white; display: none; }
        .btn-resub:hover { opacity: 0.9; }
        .success { color: #2E7D32; font-weight: 500; display: none; }
        .error { color: #B3261E; font-weight: 500; display: none; }
        a { font-size: 12px; color: #6B6259; text-decoration: none; display: block; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="title">Unsubscribe</h1>
        <p id="description">Are you sure you'd like to stop receiving loyalty reward emails? You'll still keep your tier and discounts — you just won't hear from us by email.</p>
        <button class="btn-unsub" id="unsub-btn" onclick="handleUnsub()">Yes, unsubscribe me</button>
        <button class="btn-resub" id="resub-btn" onclick="handleResub()">Re-subscribe</button>
        <p class="success" id="success-msg"></p>
        <p class="error" id="error-msg"></p>
        <a href="index.html">&larr; Back to check-in</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('title').innerText = 'Invalid Link';
            document.getElementById('description').innerText = 'This unsubscribe link is invalid or has expired.';
            document.getElementById('unsub-btn').style.display = 'none';
        }

        async function handleUnsub() {
            const btn = document.getElementById('unsub-btn');
            btn.disabled = true;
            btn.innerText = 'Processing...';
            try {
                const res = await fetch('/api/unsubscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('success-msg').innerText = `Done! ${data.email} has been unsubscribed. We're sorry to see you go.`;
                    document.getElementById('success-msg').style.display = 'block';
                    btn.style.display = 'none';
                    document.getElementById('description').style.display = 'none';
                    document.getElementById('resub-btn').style.display = 'block';
                    document.getElementById('title').innerText = 'Unsubscribed';
                } else {
                    const err = await res.json();
                    document.getElementById('error-msg').innerText = err.error || 'Something went wrong.';
                    document.getElementById('error-msg').style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = 'Yes, unsubscribe me';
                }
            } catch (e) {
                document.getElementById('error-msg').innerText = 'Network error. Please try again.';
                document.getElementById('error-msg').style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'Yes, unsubscribe me';
            }
        }

        async function handleResub() {
            const btn = document.getElementById('resub-btn');
            btn.disabled = true;
            btn.innerText = 'Processing...';
            try {
                const res = await fetch('/api/resubscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                if (res.ok) {
                    document.getElementById('success-msg').innerText = 'Welcome back! You have been re-subscribed to loyalty emails.';
                    document.getElementById('title').innerText = 'Re-subscribed!';
                    btn.style.display = 'none';
                } else {
                    btn.disabled = false;
                    btn.innerText = 'Re-subscribe';
                }
            } catch (e) {
                btn.disabled = false;
                btn.innerText = 'Re-subscribe';
            }
        }
    </script>
</body>
</html>
